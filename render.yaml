services:
  - type: web
    name: pronos-platform
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: python manage.py migrate && gunicorn config.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: .onrender.com,localhost,127.0.0.1
      - key: CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: ""
      - key: DATABASE_URL
        fromDatabase:
          name: pronos-platform-db
          property: connectionString

databases:
  - name: pronos-platform-db
    plan: free
