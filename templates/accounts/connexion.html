{% extends 'base.html' %}

{% block title %}Connexion — PronosPlatform{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-16">
  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <h1 class="font-display text-3xl tracking-wider text-white mt-3">CONNEXION</h1>
      <p class="text-slate-400 text-sm mt-1">Accédez à votre espace pronostics</p>
    </div>

    <div class="bg-dark-800/60 border border-slate-700 rounded-2xl p-8">
      <form method="post">
        {% csrf_token %}

        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-1.5">Email</label>
            <input type="email" name="email" required autocomplete="email"
                   class="w-full px-4 py-3 bg-dark-900 border border-slate-700 rounded-xl text-white"
                   placeholder="votre@email.com">
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-300 mb-1.5">Mot de passe</label>
            <input type="password" name="password" required autocomplete="current-password"
                   class="w-full px-4 py-3 bg-dark-900 border border-slate-700 rounded-xl text-white"
                   placeholder="••••••••">
          </div>

          <button type="submit"
            class="w-full py-3 bg-brand-600 hover:bg-brand-500 text-white rounded-xl font-semibold">
            Se connecter
          </button>
        </div>
      </form>

      <div class="mt-6 text-center text-sm text-slate-400">
        Pas encore de compte ?
        <a href="{% url 'accounts:inscription' %}" class="text-brand-400 hover:text-brand-300 font-medium">
          S'inscrire gratuitement
        </a>
      </div>

    </div>
  </div>
</div>
{% endblock %}
